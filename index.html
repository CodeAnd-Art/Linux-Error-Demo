<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>System Crash Simulator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Menu -->
    <div id="menu" class="menu">
        <div class="menu-container">
            <h1>🖥️ SYSTEM CRASH</h1>
            <h2>SIMULATOR</h2>
            <p class="subtitle">Gerçekçi Sistem Çöküş Ekranları</p>
            
            <div class="button-grid">
                <button class="crash-btn tecno-btn" onclick="startCrash('tecno')">
                    📱 Tecno Spark
                </button>
                <button class="crash-btn android-btn" onclick="startCrash('android')">
                    🤖 Android
                </button>
                <button class="crash-btn ios-btn" onclick="startCrash('ios')">
                    🍎 iOS
                </button>
                <button class="crash-btn bsod-btn" onclick="startCrash('bsod')">
                    💙 BSOD
                </button>
                <button class="crash-btn linux-btn" onclick="startCrash('linux')">
                    🐧 Linux
                </button>
                <button class="crash-btn all-btn" onclick="startCrash('all')">
                    ⚡ HEPSINI OYNAT
                </button>
            </div>
            
            <div class="info">
                <p>⚠️ Çöküş simülasyonu başlayacak!</p>
                <p>✖️ Çıkmak için X tuşuna basın</p>
            </div>
        </div>
    </div>

    <!-- Crash Screen -->
    <div id="crashScreen" class="crash-screen hidden">
        <button class="close-btn" onclick="closeCrash()">✕</button>
        <div class="crash-content" id="crashContent"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
