<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Monitor body -->
  <rect x="80" y="60" width="352" height="260" rx="20" fill="#1a1a1a" stroke="#00ff00" stroke-width="8"/>
  
  <!-- Screen -->
  <rect x="100" y="80" width="312" height="220" fill="#000000" stroke="#00ff00" stroke-width="4"/>
  
  <!-- Screen glitch effect -->
  <line x1="110" y1="120" x2="390" y2="120" stroke="#ff0000" stroke-width="2" opacity="0.8"/>
  <line x1="110" y1="160" x2="390" y2="160" stroke="#ff0000" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="200" x2="390" y2="200" stroke="#ff0000" stroke-width="2" opacity="0.7"/>
  
  <!-- Text on screen -->
  <text x="256" y="150" font-family="monospace" font-size="24" fill="#00ff00" text-anchor="middle" opacity="0.9">
    SYSTEM
  </text>
  <text x="256" y="180" font-family="monospace" font-size="24" fill="#00ff00" text-anchor="middle" opacity="0.9">
    ERROR
  </text>
  
  <!-- Monitor stand -->
  <rect x="150" y="340" width="212" height="40" rx="8" fill="#1a1a1a" stroke="#00ff00" stroke-width="6"/>
  
  <!-- Stand base -->
  <ellipse cx="256" cy="390" rx="120" ry="35" fill="#1a1a1a" stroke="#00ff00" stroke-width="6"/>
  
  <!-- Warning symbol -->
  <circle cx="430" cy="100" r="35" fill="#ff0000" stroke="#ffaa00" stroke-width="3" opacity="0.8"/>
  <text x="430" y="115" font-family="Arial" font-size="48" fill="#ffaa00" text-anchor="middle" font-weight="bold">!</text>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="400" r="8" fill="#00ff00" opacity="0.6"/>
  <circle cx="180" cy="420" r="6" fill="#00ff00" opacity="0.5"/>
  <circle cx="330" cy="410" r="7" fill="#ff0000" opacity="0.5"/>
  <circle cx="390" cy="430" r="5" fill="#00ff00" opacity="0.4"/>
</svg>
